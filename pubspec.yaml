name: nasz_budzet_domowy
description: "Nasz budżet domowy — aplikacja do zarządzania budżetem domowym dla dwóch osób, z synchronizacją między telefonami, wejściem głosowym po polsku (offline) i importem wyciągów bankowych."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management — Riverpod 3.0
  flutter_riverpod: ^3.0.0

  # Routing
  go_router: ^14.6.2

  # Supabase
  supabase_flutter: ^2.8.0

  # Voice input — offline ASR przez Vosk
  vosk_flutter_2: ^1.0.5
  # Rozpakowanie pobranego modelu Vosk (ZIP).
  archive: ^3.6.1
  # Zgoda na mikrofon w czasie działania (Android wymaga runtime request).
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.69.0

  # Forms
  reactive_forms: ^17.0.1

  # Lokalna persistencja
  sqflite: ^2.4.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  path: ^1.9.0

  # Sieć / status połączenia
  connectivity_plus: ^6.1.0
  http: ^1.2.2

  # i18n / daty
  intl: ^0.20.0
  timeago: ^3.7.0

  # Krypto (dedup hash)
  crypto: ^3.0.6

  # Notyfikacje lokalne (v4, ale w pubspec od początku)
  flutter_local_notifications: ^18.0.1

  # UI utility
  cupertino_icons: ^1.0.8
  collection: ^1.18.0
  uuid: ^4.5.1

  # Audio — krótkie efekty dźwiękowe (cash register dla dochodu).
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Sqflite in pure Dart (testy DAO bez emulatora).
  sqflite_common_ffi: ^2.3.3

  # Lint
  very_good_analysis: ^7.0.0

  # Code generation — dorzucimy gdy wprowadzimy @freezed / @riverpod
  # (tickety 5+). W v1 piszemy modele ręcznie żeby nie wciągać konfliktów
  # wersji analyzer'a z `freezed` / `riverpod_generator` / `custom_lint`.

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/sounds/
  fonts:
    # Zaokrąglona czcionka dla motywu „Kredka" (OFL 1.1, plik wariantowy
    # z wagami Light–Bold). Reszta motywów używa domyślnej czcionki.
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka.ttf
    # Baloo 2 — okrągła, przyjazna (motyw „Pokémon"). OFL 1.1.
    - family: Baloo2
      fonts:
        - asset: assets/fonts/Baloo2.ttf
    # Russo One — gruba, energetyczna (motyw „Dragon Ball", nagłówki). OFL 1.1.
    - family: RussoOne
      fonts:
        - asset: assets/fonts/RussoOne.ttf
    # Orbitron — sci-fi, retro-futuryzm (motyw „Synthwave"). OFL 1.1.
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron.ttf
    # Space Mono — maszynowa, terminalowa (motyw „Cyber"). OFL 1.1.
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
