name: Build debug APK

# APK testowy — bez własnego keystore'a (Flutter używa wbudowanego
# debug signing). Wystarczy do zainstalowania na telefonie i testów
# end-to-end zanim wygenerujesz keystore dla release.
#
# Trigger: workflow_dispatch (manualnie) ORAZ automatycznie po każdym
# push do main który zmienia kod apki. Dzięki temu po każdym merge
# APK buduje się sam — wystarczy pobrać artefakt z Actions.

on:
  # Manualny trigger z UI (dalej dostępny).
  workflow_dispatch:
  # Auto-build przy push do main, ALE tylko gdy zmienił się kod apki —
  # pomijamy zmiany dotyczące wyłącznie dokumentacji / skilli / migracji
  # SQL (nie wpływają na APK), żeby nie palić minut CI.
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-apk-debug.yml'

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Pliki gradle-wrapper.jar / gradlew / local.properties są .gitignored
      # (każdy clone Flutter dogenerowuje je sam). To wystarczy żeby reszta
      # zatwierdzona w repo (build.gradle.kts, MainActivity.kt, styles, mipmapy,
      # AndroidManifest.xml) miała kompletny scaffolding do buildu.
      #
      # Retry: pub.dev miewa transient socket errors (exit code 69).
      # 3 próby z exponential backoff — wystarczy w 99% przypadków.
      - name: Bootstrap gradle wrapper + local.properties
        run: |
          for attempt in 1 2 3; do
            if flutter create --platforms=android \
                 --org=pl.naszbudzetdomowy \
                 --project-name=nasz_budzet_domowy .; then
              echo "✅ flutter create OK (attempt $attempt)"
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "❌ flutter create padło 3x — pub.dev nieosiągalne"
              exit 1
            fi
            wait=$((attempt * 15))
            echo "⏳ flutter create padło (attempt $attempt) — czekam ${wait}s"
            sleep $wait
          done

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if flutter pub get; then
              echo "✅ pub get OK (attempt $attempt)"
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "❌ pub get padło 3x — pub.dev nieosiągalne"
              exit 1
            fi
            wait=$((attempt * 15))
            echo "⏳ pub get padło (attempt $attempt) — czekam ${wait}s"
            sleep $wait
          done

      # AGP 8 nie akceptuje atrybutu `package="..."` w AndroidManifest.xml
      # — namespace MUSI być w build.gradle. Stare pluginy Flutter (Vosk,
      # niektóre starsze wersje) wciąż mają legacy `package="..."` i build
      # pada na ich processDebugManifest. Stripujemy atrybut ze wszystkich
      # plugin-manifestów w pub-cache. Modyfikacja pub-cache jest OK na
      # świeżym CI runnerze (każdy run startuje od zera).
      - name: Strip legacy package="..." z manifestów starych pluginów (AGP 8)
        run: |
          set -e
          stripped=0
          while IFS= read -r f; do
            if grep -q ' package="' "$f"; then
              echo "Stripping legacy package= from: $f"
              sed -i 's/[[:space:]]\+package="[^"]*"//' "$f"
              stripped=$((stripped + 1))
            fi
          done < <(find ~/.pub-cache/hosted -name AndroidManifest.xml -path "*/android/*")
          echo "Stripped $stripped manifest(s)."

      - name: Build debug APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ Brak sekretów SUPABASE_URL / SUPABASE_ANON_KEY"
            echo "Dodaj je w Settings → Secrets and variables → Actions"
            exit 1
          fi
          flutter build apk --debug \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=APP_VERSION=debug-${{ github.sha }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasz-budzet-domowy-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 30
